name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-
    - name: Download dependencies
      run: go mod download
    - name: Vet
      run: go vet ./...
    - name: Test (race)
      run: go test -race -p 1 ./...

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - run: ./build.sh
    - name: Test binaries
      run: |
        ./distill --version
        ./distill-server --version
    - uses: actions/upload-artifact@v4
      with:
        name: binaries-linux
        path: |
          distill
          distill-server
        retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - run: .\build.ps1
    - name: Test binaries
      run: |
        .\distill.exe --version
        .\distill-server.exe --version
    - uses: actions/upload-artifact@v4
      with:
        name: binaries-windows
        path: |
          distill.exe
          distill-server.exe
        retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - run: ./build.sh
    - name: Test binaries
      run: |
        ./distill --version
        ./distill-server --version
    - uses: actions/upload-artifact@v4
      with:
        name: binaries-macos
        path: |
          distill
          distill-server
        retention-days: 7
